<div class="auth-container">
  <div class="auth-card">
    <h2>HMS Login</h2>
    <p class="subtitle">Login to your hospital account</p>

    @if (errorMessage) {
      <div class="error">
        {{ errorMessage }}
      </div>
    }

    @if (successMessage) {
      <div class="success">
        {{ successMessage }}
      </div>
    }

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="loginData.email"
          placeholder="Enter email"
          required
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="loginData.password"
          placeholder="Enter password"
          required
        />
      </div>

      <button type="submit">Login</button>
    </form>

    <p class="link-text">
      Do not have an account?
      <a routerLink="/signup">Signup</a>
    </p>
  </div>
</div>
